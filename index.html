<style>
  :root{
    --cream:#fdeede; --card:#ffffff;
    --ink:#5b463a; --ink2:#7a6354; --muted:#a98e79; --line:#f1ddc6;
    --blue:#5ba7e5; --green:#6cbf7c; --amber:#efa53b; --red:#ef6b6b; --brand:#f4a64d;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:"Quicksand","Baloo 2",-apple-system,"Segoe UI","Microsoft JhengHei",sans-serif;background:var(--cream);color:var(--ink);}
  #app{display:flex;height:100vh;overflow:hidden;}
  /* Sidebar */
  #sidebar{width:396px;min-width:396px;background:linear-gradient(165deg,#fdeede 0%,#fcefe1 45%,#fde7d4 100%);display:flex;flex-direction:column;padding:14px 14px 0;position:relative;}
  .head-card{position:relative;background:var(--card);border:2.5px solid #f7cd92;border-radius:24px;padding:16px 16px 14px;box-shadow:0 8px 20px rgba(220,160,90,.18);text-align:center;margin-bottom:14px;overflow:visible;}
  .head-card h1{margin:0;font-family:"Baloo 2","Quicksand",sans-serif;font-size:21px;font-weight:700;color:#6b4a32;letter-spacing:.5px;}
  .head-card .sub{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:.03em;}
  .pet{position:absolute;font-size:30px;line-height:1;user-select:none;filter:drop-shadow(0 3px 3px rgba(0,0,0,.10));}
  .pet.dog{top:-14px;left:-6px;font-size:34px;transform:rotate(-8deg);}
  .pet.cat{top:-16px;left:24px;font-size:26px;transform:rotate(6deg);}
  .pet.corgi{top:-15px;right:-4px;font-size:30px;transform:rotate(8deg);}
  .pet.husky{bottom:-16px;right:14px;font-size:24px;transform:rotate(-6deg);}
  .pet.paw{position:absolute;opacity:.5;font-size:18px;}
  .controls{padding:2px 4px 6px;}
  label{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--ink2);margin:0 0 7px 4px;}
  .field{position:relative;margin-bottom:12px;}
  .field .ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;opacity:.85;}
  select,input{width:100%;padding:12px 14px 12px 38px;border-radius:14px;border:2px solid #f0dcc4;background:#fff;color:var(--ink);font-size:14px;font-family:inherit;outline:none;box-shadow:0 3px 8px rgba(220,170,110,.10);appearance:none;}
  select{cursor:pointer;background-image:linear-gradient(45deg,transparent 50%,var(--brand) 50%),linear-gradient(135deg,var(--brand) 50%,transparent 50%);background-position:calc(100% - 18px) 18px,calc(100% - 13px) 18px;background-size:5px 5px,5px 5px;background-repeat:no-repeat;}
  select:focus,input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(244,166,77,.18);}
  .stat{display:flex;gap:10px;margin-bottom:12px;}
  .stat .box{flex:1;border-radius:18px;padding:11px 14px;display:flex;align-items:center;gap:10px;border:2px solid;}
  .stat .box.b1{background:#e9f4fc;border-color:#cfe7f8;}
  .stat .box.b2{background:#e9f7ec;border-color:#cfebd5;}
  .stat .box .em{font-size:26px;line-height:1;}
  .stat .box .n{font-family:"Baloo 2",sans-serif;font-size:23px;font-weight:700;line-height:1;}
  .stat .box.b1 .n{color:#3f93d8;} .stat .box.b2 .n{color:#4fae63;}
  .stat .box .l{font-size:10.5px;color:var(--muted);margin-top:3px;line-height:1.25;}
  .legend{display:flex;gap:8px;margin-bottom:6px;}
  .legend span{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:5px;border-radius:13px;padding:7px 4px;font-size:11px;font-weight:600;border:2px solid;}
  .legend span.lb{background:#e9f4fc;border-color:#cfe7f8;color:#3f93d8;}
  .legend span.ls{background:#fdf1dc;border-color:#f6e0b8;color:#cf942e;}
  .legend span.la{background:#fde9e9;border-color:#f7cfcf;color:#d65656;}
  .legend i{width:10px;height:10px;border-radius:50%;display:inline-block;}
  .list-head{display:flex;align-items:center;gap:8px;font-weight:700;color:#7a5a3e;font-size:14px;margin:8px 4px 6px;}
  .list-head .bone{flex:1;height:0;border-top:2px dashed #efd6b6;}
  #list{flex:1;overflow-y:auto;padding:2px 2px 20px;}
  #list::-webkit-scrollbar{width:8px;} #list::-webkit-scrollbar-thumb{background:#ecd3b4;border-radius:8px;}
  .item{display:flex;align-items:flex-start;gap:11px;background:#fff;padding:11px 12px;border-radius:16px;border:2px solid #f4e6d3;box-shadow:0 3px 8px rgba(220,170,110,.10);cursor:pointer;margin-bottom:9px;transition:transform .08s,border-color .12s;}
  .item:hover{border-color:#f6c98a;transform:translateY(-1px);}
  .item.active{border-color:var(--brand);box-shadow:0 0 0 3px rgba(244,166,77,.16);}
  .item .num{flex:none;width:30px;height:30px;border-radius:50%;color:#fff;font-family:"Baloo 2",sans-serif;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 5px rgba(0,0,0,.12);}
  .item .body{flex:1;min-width:0;}
  .item .name{font-size:14px;font-weight:700;color:#5b463a;}
  .item .addr{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.4;}
  .item .meta{font-size:11px;color:#b09077;margin-top:5px;}
  .item .chev{flex:none;align-self:center;color:#d9b894;font-size:17px;}
  .badge{display:inline-block;background:#e9f7ec;border:1.5px solid #cfebd5;border-radius:999px;padding:1px 9px;font-size:10.5px;font-weight:600;color:#4fae63;margin-right:5px;}
  .badge.street{background:#fdf1dc;border-color:#f6e0b8;color:#cf942e;}
  .badge.approx{background:#fde9e9;border-color:#f7cfcf;color:#d65656;}
  .empty{color:var(--muted);text-align:center;padding:30px 16px;font-size:13px;}
  .foot{margin:6px -14px 0;padding:12px 18px;font-size:10.5px;line-height:1.5;color:#fff;background:linear-gradient(120deg,#a9bce4,#bca6d8);}
  .foot a{color:#fff;text-decoration:underline;}
  /* Map */
  #map{flex:1;height:100%;}
  .leaflet-popup-content-wrapper{background:#fff;color:var(--ink);border-radius:16px;box-shadow:0 8px 24px rgba(150,110,70,.25);}
  .leaflet-popup-tip{background:#fff;}
  .leaflet-popup-content{margin:13px 15px;}
  .pop .pname{font-weight:700;font-size:15px;color:#5b463a;}
  .pop .paddr{color:var(--muted);font-size:12px;margin-top:5px;line-height:1.5;}
  .pop .pmeta{font-size:11px;color:#b09077;margin-top:6px;}
  .pop a{color:var(--brand);font-size:12px;text-decoration:underline;}
  .pin{background:var(--blue);width:15px;height:15px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 0 0 1.5px rgba(91,167,229,.5),0 2px 4px rgba(0,0,0,.25);}
  .pin.street{background:var(--amber);box-shadow:0 0 0 1.5px rgba(239,165,59,.5),0 2px 4px rgba(0,0,0,.25);}
  .pin.approx{background:var(--red);box-shadow:0 0 0 1.5px rgba(239,107,107,.5),0 2px 4px rgba(0,0,0,.25);}
  /* Bottom toolbar — mobile only */
  #mnav{display:none;position:fixed;left:0;right:0;bottom:0;height:60px;z-index:1200;
    background:#fff;border-top:2px solid #f1ddc6;box-shadow:0 -4px 16px rgba(180,130,80,.14);
    padding-bottom:env(safe-area-inset-bottom);}
  #mnav button{flex:1;border:none;background:none;font-family:inherit;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    color:var(--muted);font-size:11.5px;font-weight:700;}
  #mnav button .mi{font-size:21px;line-height:1;}
  #mnav button.on{color:var(--brand);}
  #mnav button.on .mi{filter:drop-shadow(0 2px 3px rgba(244,166,77,.4));}
  @media(max-width:780px){
    #app{display:block;height:100%;}
    #sidebar,#map{position:fixed;left:0;right:0;top:0;bottom:60px;width:auto;min-width:0;height:auto;}
    #map{z-index:400;}
    #sidebar{z-index:600;overflow-y:auto;padding:12px 12px 16px;}
    #mnav{display:flex;}
    body.view-map #sidebar{display:none;}
    body.view-map #map{z-index:600;}
    .foot{margin:6px -12px 0;}
  }
</style>
</head>

<script>
const DISTRICT_COORDS = {
  "中西區":[22.2819,114.1552],"灣仔區":[22.2783,114.1747],"東區":[22.2840,114.2240],
  "南區":[22.2470,114.1590],"油尖旺區":[22.3140,114.1700],"深水埗區":[22.3303,114.1622],
  "九龍城區":[22.3280,114.1920],"黃大仙區":[22.3420,114.1953],"觀塘區":[22.3100,114.2260],
  "荃灣區":[22.3710,114.1140],"屯門區":[22.3910,113.9770],"元朗區":[22.4445,114.0220],
  "北區":[22.4940,114.1380],"大埔區":[22.4500,114.1640],"西貢區":[22.3810,114.2710],
  "沙田區":[22.3820,114.1880],"葵青區":[22.3550,114.1290],"離島區":[22.2610,113.9460],
  "未能分類":[22.2900,114.1600]
};

const DATA = JSON.parse(document.getElementById('shopdata').textContent)
  .filter(d => d && d.name && d.lat && d.lon);
DATA.forEach((d,i)=>d._id=i);

const map = L.map('map',{zoomControl:true}).setView([22.34,114.14],11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO', maxZoom:19
}).addTo(map);

const cluster = L.markerClusterGroup({maxClusterRadius:45,spiderfyOnMaxZoom:true});
map.addLayer(cluster);
const markerById = {};

const $district = document.getElementById('district');
const $search   = document.getElementById('search');
const $list     = document.getElementById('list');
const $statShops= document.getElementById('statShops');
const $statBuilding=document.getElementById('statBuilding');
const TIER_LABEL={building:'大廈級定位 Building-level',street:'街道級（約略） Street-level',approx:'區中心概略 District centre'};
document.getElementById('statTotal').textContent = DATA.length;

const districts = [...new Set(DATA.map(d=>d.district))]
  .sort((a,b)=>(DISTRICT_COORDS[a]?0:1)-(DISTRICT_COORDS[b]?0:1) || a.localeCompare(b,'zh-HK'));
$district.innerHTML = `<option value="">全部地區 (All districts)</option>` +
  districts.map(d=>`<option value="${d}">${d} (${DATA.filter(x=>x.district===d).length})</option>`).join('');

function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function gmaps(a){ return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(a); }
function tierOf(x){ return x.tier || (x.approx?'approx':'building'); }
function pinIcon(x){ const t=tierOf(x); return L.divIcon({className:'',html:`<div class="pin ${t==='building'?'':t}"></div>`,iconSize:[14,14],iconAnchor:[7,14],popupAnchor:[0,-14]}); }
function popupHtml(x){
  const t=tierOf(x), col=t==='building'?'var(--accent)':(t==='street'?'var(--accent2)':'#ef4444');
  return `<div class="pop"><div class="pname">${esc(x.name)}</div>`+
    `<div class="paddr">${esc(x.address)}</div>`+
    `<div class="pmeta">牌照 ${esc(x.license)} · <span style="color:${col}">${TIER_LABEL[t]}</span><br>`+
    `<a href="${gmaps(x.address)}" target="_blank" rel="noopener">在 Google 地圖開啟 →</a></div></div>`;
}

function currentFilter(){
  const d=$district.value, q=$search.value.trim().toLowerCase();
  return DATA.filter(x=>
    (!d || x.district===d) &&
    (!q || (x.name&&x.name.toLowerCase().includes(q)) || (x.address&&x.address.toLowerCase().includes(q)))
  );
}

let activeEl=null;
function focusShop(x,fromList){
  const m = markerById[x._id]; if(!m) return;
  if(fromList && isMobile()) mview('map');   // on mobile, jump to the map to show the pin
  map.setView([x.lat,x.lon], Math.max(map.getZoom(),17), {animate:true});
  cluster.zoomToShowLayer(m, ()=>m.openPopup());
  const el = document.querySelector(`.item[data-id="${x._id}"]`);
  if(activeEl) activeEl.classList.remove('active');
  if(el){ el.classList.add('active'); activeEl=el; if(!fromList) el.scrollIntoView({block:'nearest'}); }
}

function render(){
  const rows = currentFilter();
  cluster.clearLayers();
  for(const k in markerById) delete markerById[k];
  const markers=[];
  rows.forEach(x=>{
    const m=L.marker([x.lat,x.lon],{icon:pinIcon(x)});
    m.bindPopup(popupHtml(x));
    m.on('click',()=>focusShop(x,false));
    markerById[x._id]=m; markers.push(m);
  });
  cluster.addLayers(markers);

  $statShops.textContent = rows.length;
  $statBuilding.textContent = rows.filter(x=>tierOf(x)==='building').length;

  if(rows.length===0){
    $list.innerHTML=`<div class="empty">沒有符合條件的店舖<br>No shops match</div>`;
  } else {
    const PALETTE=['#5ba7e5','#6cbf7c','#efa53b','#ef6b6b','#a78bf0','#f08fc0'];
    const badgeCls=x=>{const t=tierOf(x);return t==='street'?' street':(t==='approx'?' approx':'');};
    $list.innerHTML = rows
      .sort((a,b)=>(a.district||'').localeCompare(b.district||'','zh-HK')||(a.name||'').localeCompare(b.name||'','zh-HK'))
      .map((x,i)=>`<div class="item" data-id="${x._id}">
        <div class="num" style="background:${PALETTE[i%PALETTE.length]}">${i+1}</div>
        <div class="body">
          <div class="name">${esc(x.name)}</div>
          <div class="addr">${esc(x.address)}</div>
          <div class="meta"><span class="badge${badgeCls(x)}">${esc(x.district)}</span>牌照 ${esc(x.license)}</div>
        </div>
        <div class="chev">›</div>
      </div>`).join('');
    $list.querySelectorAll('.item').forEach(el=>{
      el.addEventListener('click',()=>{ const x=DATA[+el.dataset.id]; focusShop(x,true); });
    });
  }
  activeEl=null;
}

function fitToFilter(){
  const rows=currentFilter();
  if(rows.length===0){ map.setView([22.34,114.14],11); return; }
  const b=L.latLngBounds(rows.map(x=>[x.lat,x.lon]));
  map.fitBounds(b.pad(0.15),{maxZoom:16});
}

$district.addEventListener('change',()=>{ render(); fitToFilter(); });
$search.addEventListener('input',render);

// --- mobile bottom-toolbar: switch between Info panel and Map ---
const isMobile=()=>window.matchMedia('(max-width:780px)').matches;
const $navInfo=document.getElementById('navInfo'), $navMap=document.getElementById('navMap');
function mview(v){
  document.body.classList.remove('view-map','view-info');
  document.body.classList.add('view-'+v);
  $navMap.classList.toggle('on', v==='map');
  $navInfo.classList.toggle('on', v==='info');
  if(v==='map') setTimeout(()=>map.invalidateSize(),60);
}
$navInfo.addEventListener('click',()=>mview('info'));
$navMap.addEventListener('click',()=>mview('map'));
mview('info');   // default to the info/list panel so all controls are visible

render();
</script>
